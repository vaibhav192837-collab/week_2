<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Task Manager</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .task-box { border: 1px solid #ccc; padding: 10px; margin-top: 10px; border-radius: 5px; }
        .btn-load { padding: 10px 15px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .btn-status { padding: 5px 10px; margin-top: 10px; background-color: #28a745; color: white; border: none; border-radius: 3px; cursor: pointer; }
        .btn-status.pending { background-color: #ffc107; color: black; }
    </style>
</head>
<body>

    <h1>📋 Task Dashboard</h1>
    <button class="btn-load" onclick="loadTasks()">Load My Tasks</button>
    
    <div id="task-container"></div>

    <script>
        // We will store our tasks here so we can easily look them up when updating
        let currentTasks = [];

        async function loadTasks() {
            const container = document.getElementById("task-container");
            container.innerHTML = "<i>Loading tasks...</i>";

            try {
                const response = await fetch("http://127.0.0.1:8000/tasks/");
                currentTasks = await response.json(); // Save the data to our variable
                container.innerHTML = "";

                if (currentTasks.length === 0) {
                    container.innerHTML = "<p>No tasks found. Add some in Postman!</p>";
                    return;
                }

                currentTasks.forEach(task => {
                    // Create a dynamic button that changes based on the current status
                    const buttonText = task.completed ? "Mark as Pending" : "Mark as Done";
                    const buttonClass = task.completed ? "btn-status pending" : "btn-status";

                    const taskHTML = `
                        <div class="task-box">
                            <h3>#${task.id}: ${task.title}</h3>
                            <p>${task.description || "No description provided"}</p>
                            <small>Status: ${task.completed ? "✅ Done" : "⏳ Pending"}</small>
                            <br>
                            <button class="${buttonClass}" onclick="toggleStatus(${task.id})">${buttonText}</button>
                        </div>
                    `;
                    container.innerHTML += taskHTML;
                });

            } catch (error) {
                container.innerHTML = "<p style='color:red;'>Failed to connect. Is Uvicorn running?</p>";
            }
        }

        // 🌟 NEW FUNCTION: This handles the PUT request 🌟
        async function toggleStatus(taskId) {
            // 1. Find the exact task the user clicked on
            const task = currentTasks.find(t => t.id === taskId);
            
            // 2. Flip the boolean status (if true, make false. If false, make true)
            const newStatus = !task.completed;

            // 3. Package the data for our Pydantic Bouncer
            const updatedData = {
                title: task.title,             // Pydantic strictly requires the title!
                description: task.description, 
                completed: newStatus           // Our flipped status
            };

            try {
                // 4. Send the PUT request to your FastAPI router
                await fetch(`http://127.0.0.1:8000/tasks/${taskId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(updatedData)
                });

                // 5. Reload the UI to show the fresh data
                loadTasks();
            } catch (error) {
                alert("Error updating task status!");
            }
        }
    </script>
</body>
</html>
